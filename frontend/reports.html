<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>KilaKitu — Reports</title>
    <link rel="stylesheet" href="css/style.css"/>
    <style>
        .report-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0;
        }
        .report-tab {
            padding: 10px 20px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-family: var(--font-body);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            letter-spacing: 0.04em;
        }
        .report-tab:hover  { color: var(--text-primary); }
        .report-tab.active { color: var(--gold); border-bottom-color: var(--gold); }

        .report-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .report-period {
            font-size: 0.82rem;
            color: var(--text-muted);
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 6px 14px;
        }

        .custom-range {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* Summary row */
        .summary-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 28px;
        }

        /* Chart area */
        .chart-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 20px;
        }

        .chart-title {
            font-family: var(--font-display);
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 20px;
        }

        /* Simple bar chart */
        .bar-chart {
            display: flex;
            align-items: flex-end;
            gap: 6px;
            height: 160px;
            padding-bottom: 28px;
            position: relative;
            border-bottom: 1px solid var(--border);
        }

        .bar-chart-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            gap: 6px;
            position: relative;
            height: 100%;
        }

        .bar-fill {
            width: 100%;
            border-radius: 4px 4px 0 0;
            background: linear-gradient(to top, var(--gold-dim), var(--gold));
            transition: height 0.8s cubic-bezier(0.4,0,0.2,1);
            min-height: 2px;
            cursor: pointer;
            position: relative;
        }

        .bar-fill:hover { background: linear-gradient(to top, var(--gold), var(--gold-light)); }

        .bar-label {
            position: absolute;
            bottom: -22px;
            font-size: 0.65rem;
            color: var(--text-muted);
            white-space: nowrap;
            text-align: center;
            width: 100%;
        }

        .bar-value {
            position: absolute;
            top: -18px;
            font-size: 0.65rem;
            color: var(--gold);
            font-family: 'Calibri','Candara','Segoe UI',sans-serif;
            white-space: nowrap;
        }

        /* Two column grid */
        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }

        /* Category performance */
        .cat-perf-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .cat-perf-row:last-child { border-bottom: none; }
        .cat-perf-name  { font-size: 0.85rem; color: var(--text-primary); font-weight: 500; }
        .cat-perf-stats { text-align: right; }
        .cat-perf-rev   { font-family: 'Calibri','Candara','Segoe UI',sans-serif; font-size: 0.9rem; font-weight: 600; color: var(--gold); }
        .cat-perf-items { font-size: 0.72rem; color: var(--text-muted); }

        /* Top products table */
        .top-prod-rank {
            width: 24px; height: 24px;
            border-radius: 50%;
            background: var(--gold-glow);
            border: 1px solid var(--gold-dim);
            color: var(--gold);
            font-size: 0.72rem;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-family: 'Calibri','Candara','Segoe UI',sans-serif;
        }

        /* Payment breakdown */
        .pay-breakdown { display: flex; gap: 12px; flex-wrap: wrap; }
        .pay-item {
            flex: 1;
            min-width: 100px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 14px;
            text-align: center;
        }
        .pay-item-method { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 6px; }
        .pay-item-amount { font-family: 'Calibri','Candara','Segoe UI',sans-serif; font-size: 1rem; font-weight: 600; color: var(--text-primary); }
        .pay-item-count  { font-size: 0.72rem; color: var(--text-muted); margin-top: 2px; }

        @media (max-width: 900px) {
            .summary-row { grid-template-columns: repeat(2, 1fr); }
            .two-col     { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="app-layout">

    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-name">KilaKitu</div>
            <div class="brand-tagline">Point of Sale</div>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-section-label">Main</div>
            <a href="dashboard.html" class="nav-item" data-page="dashboard">Dashboard</a>
            <a href="pos.html"       class="nav-item" data-page="pos">New Sale</a>
            <div class="nav-section-label" style="margin-top:8px;">Management</div>
            <a href="inventory.html" class="nav-item" data-page="inventory">Inventory</a>
            <a href="products.html"  class="nav-item" data-page="products">Products</a>
            <a href="reports.html"   class="nav-item active" data-page="reports">Reports</a>
            <div class="nav-section-label" style="margin-top:8px;">Admin</div>
            <a href="settings.html"  class="nav-item" data-page="settings">Settings</a>
        </nav>
        <div class="sidebar-footer">
            <div class="sidebar-user" onclick="logout()">
                <div class="user-avatar" id="sidebarAvatar">A</div>
                <div class="user-info">
                    <div class="user-name" id="sidebarUserName">Loading...</div>
                    <div class="user-role" id="sidebarUserRole">—</div>
                </div>
            </div>
        </div>
    </aside>

    <div class="main-content">
        <div class="topbar">
            <div class="page-title">Reports</div>
            <div class="flex-center gap-12">
                <button class="btn btn-outline btn-sm" onclick="downloadCSV()">Download CSV</button>
                <button class="btn btn-gold btn-sm"    onclick="downloadPDF()">Download PDF</button>
            </div>
        </div>

        <div class="page-content page-fade">

            <!-- Period tabs -->
            <div class="report-tabs">
                <button class="report-tab active" data-type="daily"   onclick="switchTab('daily',   this)">Daily</button>
                <button class="report-tab"        data-type="weekly"  onclick="switchTab('weekly',  this)">Weekly</button>
                <button class="report-tab"        data-type="monthly" onclick="switchTab('monthly', this)">Monthly</button>
                <button class="report-tab"        data-type="annual"  onclick="switchTab('annual',  this)">Annual</button>
                <button class="report-tab"        data-type="custom"  onclick="switchTab('custom',  this)">Custom Range</button>
            </div>

            <!-- Custom date range (hidden by default) -->
            <div class="custom-range hidden" id="customRange" style="margin-bottom:20px;">
                <div class="form-group" style="flex-direction:row;align-items:center;gap:8px;">
                    <label class="form-label" style="white-space:nowrap;">From</label>
                    <input type="date" class="form-control" id="customFrom" style="width:160px;"/>
                </div>
                <div class="form-group" style="flex-direction:row;align-items:center;gap:8px;">
                    <label class="form-label" style="white-space:nowrap;">To</label>
                    <input type="date" class="form-control" id="customTo" style="width:160px;"/>
                </div>
                <button class="btn btn-gold btn-sm" onclick="loadCustomReport()">Generate</button>
            </div>

            <!-- Weekly insights (shown only on weekly tab) -->
            <div class="hidden" id="weeklyInsights" style="margin-bottom:24px;">
                <div class="card">
                    <div class="card-header">
                        <div class="card-title" id="insightsPanelTitle">Weekly Insights</div>
                        <span class="text-muted text-sm" id="insightsPanelSub">Busiest days, hours & top sellers</span>
                    </div>
                    <div id="weeklyInsightsContent" style="padding:4px 0;">
                        <div class="text-center" style="padding:40px;"><div class="spinner"></div></div>
                    </div>
                </div>
            </div>

            <!-- Report header -->
            <div class="report-header">
                <div>
                    <div style="font-family:var(--font-display);font-size:1.2rem;font-weight:500;" id="reportTitle">
                        Today's Report
                    </div>
                    <div class="report-period" id="reportPeriod" style="margin-top:6px;display:inline-block;">—</div>
                </div>
            </div>

            <!-- Summary cards -->
            <div class="summary-row" id="summaryRow">
                <div class="stat-card skeleton" style="height:110px;"></div>
                <div class="stat-card skeleton" style="height:110px;"></div>
                <div class="stat-card skeleton" style="height:110px;"></div>
                <div class="stat-card skeleton" style="height:110px;"></div>
            </div>

            <!-- Bar chart -->
            <div class="chart-card">
                <div class="chart-title" id="chartTitle">Revenue Over Time</div>
                <div class="bar-chart" id="barChart"></div>
                <div id="chartLegend" style="display:flex;gap:20px;margin-top:12px;font-size:0.75rem;color:var(--text-muted);">
                    <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--gold);margin-right:5px;"></span>Sales</span>
                    <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--success);margin-right:5px;"></span>Profit</span>
                </div>
                <div style="display:none" id="barChartHidden">
                    <div class="text-center" style="width:100%;padding:40px 0;">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div></div>

            <!-- Two columns -->
            <div class="two-col">

                <!-- Category performance -->
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">Sales by Category</div>
                    </div>
                    <div id="categoryPerf">
                        <div class="text-center" style="padding:40px;"><div class="spinner"></div></div>
                    </div>
                </div>

                <!-- Payment methods -->
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">Payment Methods</div>
                    </div>
                    <div id="paymentBreakdown" style="padding-top:8px;">
                        <div class="text-center" style="padding:40px;"><div class="spinner"></div></div>
                    </div>
                </div>

            </div>

            <!-- Top products -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title">Top 10 Products</div>
                </div>
                <div class="table-wrap" id="topProductsWrap">
                    <div class="text-center" style="padding:40px;"><div class="spinner"></div></div>
                </div>
            </div>

            <!-- Sales transactions -->
            <div class="card" style="margin-top:20px;">
                <div class="card-header">
                    <div class="card-title">All Transactions</div>
                    <span class="text-muted text-sm" id="txCount">—</span>
                </div>
                <div class="table-wrap" id="transactionsWrap">
                    <div class="text-center" style="padding:40px;"><div class="spinner"></div></div>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="js/auth.js"></script>
<script src="js/reports.js"></script>
</body>
</html>
